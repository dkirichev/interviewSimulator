# Privacy Policy
legal.privacy.overview.title=Aper\u00e7u
legal.privacy.overview.content=Interview Simulator est un projet open source con\u00e7u pour vous aider \u00e0 vous entra\u00eener aux entretiens. Nous nous engageons \u00e0 prot\u00e9ger votre vie priv\u00e9e tout en vous offrant une exp\u00e9rience d'apprentissage enrichissante.

