legal.privacy.dataCollected.interviewDesc=Transcriptions compl\u00e8tes de vos conversations d'entretien avec l'IA
legal.privacy.dataCollected.performance=Indicateurs de performance
legal.privacy.dataCollected.performanceDesc=Scores, commentaires, points forts et axes d'am\u00e9lioration g\u00e9n\u00e9r\u00e9s par l'IA

