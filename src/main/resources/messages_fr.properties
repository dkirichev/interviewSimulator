legal.privacy.dataCollected.cv=CV / R\u00e9sum\u00e9
legal.privacy.dataCollected.cvDesc=Texte extrait des fichiers PDF/DOCX t\u00e9l\u00e9vers\u00e9s pour personnaliser les questions d'entretien
