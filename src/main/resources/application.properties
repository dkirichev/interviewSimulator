spring.application.name=interviewSimulator

# Application Mode: DEV, PROD, or REVIEWER
# DEV = Use backend API key (for development)
# PROD = Require user to provide their own API key
# REVIEWER = Hide API modal, use multi-key rotation (for competition judges)
app.mode=${APP_MODE}

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
# Schema is owned by Flyway; Hibernate must validate, not mutate.
spring.jpa.hibernate.ddl-auto=validate
# Do not log SQL or bound parameters in production — candidate names / positions
# would land in log aggregation.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Gemini API Configuration
# In PROD mode, this key is ignored - users provide their own
gemini.api-key=${GEMINI_API_KEY:}
gemini.live-model=gemini-2.5-flash-native-audio-preview-12-2025
gemini.grading-model=gemini-3-flash-preview
# Grading model fallback chain (comma-separated, used in PROD + REVIEWER modes)
gemini.grading-models=${GEMINI_GRADING_MODELS:gemini-3-flash-preview,gemini-2.5-flash,gemini-2.5-flash-lite,gemma-3-12b-it}
# Reviewer API keys (comma-separated, REVIEWER mode only)
gemini.reviewer-keys=${GEMINI_REVIEWER_KEYS:}
# Available voices: Algieba, Despina, Fenrir, Kore
# This will get overridden by the voice the user chooses in the UI
gemini.voice-name=Fenrir

# Internationalization (i18n)
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Session cookie hardening. Secure defaults to true for prod (HTTPS required).
# For local HTTP dev override with SESSION_COOKIE_SECURE=false.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# Close Hibernate session at the end of the service layer, not the view. Avoids
# surprise lazy-loading queries during template rendering (performance + reduces
# chances of exposing unintended data).
spring.jpa.open-in-view=false

# Reverse proxy: set to true ONLY when deployed behind a trusted proxy that
# strips/sets X-Forwarded-For. Default false prevents source-IP spoofing.
app.trust-forwarded-headers=false

# Actuator: expose ONLY /actuator/health (used by Docker HEALTHCHECK).
# Hide details so unauthenticated callers can't enumerate beans/env.
management.endpoints.web.exposure.include=health
management.endpoints.web.exposure.exclude=*
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.info.env.enabled=false

# Logging
logging.level.net.k2ai.interviewSimulator=INFO
logging.level.org.springframework.messaging=WARN
