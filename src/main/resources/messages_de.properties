# Privacy Policy
legal.privacy.overview.title=\u00dcbersicht
legal.privacy.overview.content=Interview Simulator ist ein Open-Source-Projekt, das Ihnen hilft, Bewerbungsgespr\u00e4che zu \u00fcben. Wir setzen uns daf\u00fcr ein, Ihre Privatsph\u00e4re zu sch\u00fctzen und gleichzeitig ein wertvolles Lernerlebnis zu bieten.

legal.privacy.dataCollected.title=Informationen, die wir erheben
legal.privacy.dataCollected.profile=Profildaten
legal.privacy.dataCollected.profileDesc=Ihr Name, Ihre Zielposition und Interviewpr\u00e4ferenzen (Schwierigkeit, Sprache)
legal.privacy.dataCollected.cv=Lebenslauf
legal.privacy.dataCollected.cvDesc=Text, der aus hochgeladenen PDF-/DOCX-Dateien extrahiert wird, um Interviewfragen zu personalisieren
legal.privacy.dataCollected.interview=Interviewdaten
legal.privacy.dataCollected.interviewDesc=Vollst\u00e4ndige Transkripte Ihrer Interviewgespr\u00e4che mit der KI
legal.privacy.dataCollected.performance=Leistungskennzahlen
legal.privacy.dataCollected.performanceDesc=Bewertungen, Feedback, St\u00e4rken und Verbesserungsbereiche, die von der KI generiert werden

legal.privacy.dataNotCollected.title=Was wir NICHT erheben
legal.privacy.dataNotCollected.audio=Audioaufnahmen
legal.privacy.dataNotCollected.audioDesc=Ihre Stimme wird in Echtzeit verarbeitet, aber niemals dauerhaft gespeichert
legal.privacy.dataNotCollected.apiKey=API-Schl\u00fcssel
legal.privacy.dataNotCollected.apiKeyDesc=Werden nur im localStorage Ihres Browsers gespeichert, niemals auf unseren Servern
legal.privacy.dataNotCollected.pii=Personenbezogene Daten
legal.privacy.dataNotCollected.piiDesc=Keine E-Mail-Adresse, Telefonnummer oder Anschrift erforderlich

legal.privacy.storage.title=Datenspeicherung & Sicherheit
legal.privacy.storage.database=Interviewprotokolle und Feedback werden in einer PostgreSQL-Datenbank gespeichert
legal.privacy.storage.browser=API-Schl\u00fcssel und Spracheinstellungen werden im localStorage Ihres Browsers gespeichert
legal.privacy.storage.encryption=Daten werden \u00fcber Standard-WebSocket-Verbindungen \u00fcbertragen

legal.privacy.thirdParty.title=Drittanbieterdienste
legal.privacy.thirdParty.content=Diese Anwendung nutzt die <strong>Google Gemini AI API</strong> f\u00fcr die Interview-Funktionalit\u00e4t. Ihre Audio- und Transkriptdaten werden zur Echtzeitverarbeitung an Google-Server gesendet. Bitte lesen Sie die <a href="https://policies.google.com/privacy" target="_blank" class="text-blue-400 hover:underline">Datenschutzerkl\u00e4rung von Google</a> und die <a href="https://ai.google.dev/gemini-api/terms" target="_blank" class="text-blue-400 hover:underline">Gemini API-Nutzungsbedingungen</a>.

legal.privacy.apiKey.title=Ihr API-Schl\u00fcssel
legal.privacy.apiKey.important=WICHTIG
legal.privacy.apiKey.stored=Wird NUR im localStorage Ihres Browsers gespeichert (clientseitig)
legal.privacy.apiKey.notTransmitted=Wird niemals an unsere Server \u00fcbertragen oder dort gespeichert
legal.privacy.apiKey.responsibility=Sie sind f\u00fcr die Sicherheit und die Nutzungskosten Ihres API-Schl\u00fcssels verantwortlich

legal.privacy.rights.title=Ihre Rechte (DSGVO-Konformit\u00e4t)
legal.privacy.rights.access=Recht auf Zugang zu Ihren Daten
legal.privacy.rights.rectification=Recht auf Berichtigung unrichtiger Daten
legal.privacy.rights.erasure=Recht auf L\u00f6schung (\u201eRecht auf Vergessenwerden\u201c)
legal.privacy.rights.portability=Recht auf Daten\u00fcbertragbarkeit
legal.privacy.rights.selfHost=Recht, die Anwendung selbst zu hosten f\u00fcr vollst\u00e4ndige Kontrolle
legal.privacy.rights.contact=Um diese Rechte auszu\u00fcben, wenden Sie sich an den Instanz-Administrator oder er\u00f6ffnen Sie ein Issue auf GitHub.

legal.privacy.openSource.title=Open-Source-Transparenz
legal.privacy.openSource.content=Dieses Projekt ist Open Source unter der GNU GPL v3.0. Sie k\u00f6nnen den gesamten Code auf <a href="https://github.com/dkirichev/interviewSimulator" target="_blank" class="text-blue-400 hover:underline">GitHub</a> einsehen, um genau zu verstehen, wie Ihre Daten verarbeitet werden.

legal.privacy.contact.title=Kontakt
legal.privacy.contact.content=Bei Datenschutzbedenken er\u00f6ffnen Sie bitte ein Issue im GitHub-Repository oder kontaktieren Sie den Instanz-Administrator.

# Terms & Conditions
legal.terms.acceptance.title=Annahme der Bedingungen
legal.terms.acceptance.content=Durch die Nutzung des Interview Simulators stimmen Sie diesen Allgemeinen Gesch\u00e4ftsbedingungen zu. Wenn Sie nicht zustimmen, nutzen Sie diese Anwendung bitte nicht.

legal.terms.service.title=Beschreibung des Dienstes
legal.terms.service.content=Interview Simulator ist eine kostenlose Open-Source-Anwendung, die KI-gest\u00fctzte Interviewvorbereitung mit Google Gemini AI bietet \u2013 mit Echtzeit-Sprachsimulationen, KI-generiertem Feedback und Bewertungen.

legal.terms.usage.title=Zul\u00e4ssige Nutzung
legal.terms.usage.youAgree=Sie stimmen zu
legal.terms.usage.lawful=Den Dienst nur f\u00fcr rechtm\u00e4\u00dfige Interview\u00fcbungszwecke zu nutzen
legal.terms.usage.accurate=W\u00e4hrend der Einrichtung korrekte Angaben zu machen
legal.terms.usage.apiKey=F\u00fcr Ihren eigenen Google Gemini API-Schl\u00fcssel und die damit verbundenen Kosten verantwortlich zu sein
legal.terms.usage.noAbuse=Nicht zu versuchen, den Dienst auszunutzen, zu hacken oder zu missbrauchen
legal.terms.usage.noHarm=Den Dienst nicht zur Erstellung sch\u00e4dlicher oder unangemessener Inhalte zu nutzen

legal.terms.apiKeyResp.title=Verantwortung f\u00fcr den API-Schl\u00fcssel
legal.terms.apiKeyResp.important=WICHTIG
legal.terms.apiKeyResp.security=Sie sind allein f\u00fcr die Sicherheit Ihres API-Schl\u00fcssels verantwortlich
legal.terms.apiKeyResp.costs=Sie sind f\u00fcr alle durch die API-Nutzung entstehenden Kosten verantwortlich
legal.terms.apiKeyResp.comply=Sie m\u00fcssen die Nutzungsbedingungen der Google Gemini API einhalten
legal.terms.apiKeyResp.liability=Die Anwendung haftet nicht f\u00fcr die unbefugte Nutzung Ihres API-Schl\u00fcssels

legal.terms.license.title=Open-Source-Lizenz
legal.terms.license.content=Diese Software ist unter der <strong>GNU General Public License v3.0 (GPL-3.0)</strong> lizenziert. Sie d\u00fcrfen die Software frei verwenden, \u00e4ndern und verbreiten, vorausgesetzt, \u00c4nderungen werden ebenfalls unter der GPL-3.0 ver\u00f6ffentlicht. Siehe die <a href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank" class="text-blue-400 hover:underline">LIZENZ</a> f\u00fcr die vollst\u00e4ndigen Bedingungen.

legal.terms.warranty.title=Keine Gew\u00e4hrleistung
legal.terms.warranty.asIs=Diese Software wird ohne Gew\u00e4hrleistung \u201eWIE BESEHEN\u201c bereitgestellt
legal.terms.warranty.noGuarantee=Keine Garantie f\u00fcr Verf\u00fcgbarkeit, Betriebszeit oder Genauigkeit
legal.terms.warranty.aiFeedback=KI-generiertes Feedback ist m\u00f6glicherweise nicht korrekt oder vollst\u00e4ndig
legal.terms.warranty.notSubstitute=Kein Ersatz f\u00fcr professionelle Karriereberatung
legal.terms.warranty.noSuccess=Ergebnisse garantieren keinen Erfolg bei tats\u00e4chlichen Bewerbungsgespr\u00e4chen

legal.terms.liability.title=Haftungsbeschr\u00e4nkung
legal.terms.liability.content=Die Entwickler und Mitwirkenden haften nicht f\u00fcr Sch\u00e4den, die aus der Nutzung des Dienstes, angefallenen API-Kosten, Datenverlust, Sicherheitsverst\u00f6\u00dfen, Dienstunterbrechungen oder auf KI-generiertem Feedback basierenden Entscheidungen entstehen.

legal.terms.thirdParty.title=Drittanbieterdienste
legal.terms.thirdParty.content=Diese Anwendung nutzt Google Gemini AI, das eigenen Nutzungsbedingungen unterliegt. Sie m\u00fcssen die <a href="https://ai.google.dev/gemini-api/terms" target="_blank" class="text-blue-400 hover:underline">Gemini API-Nutzungsbedingungen von Google</a> einhalten. Die Verf\u00fcgbarkeit des Google-Dienstes beeinflusst diese Anwendung und kann sich jederzeit \u00e4ndern.

legal.terms.privacy.title=Daten & Datenschutz
legal.terms.privacy.content=Ihre Nutzung unterliegt unserer <a th:href="@{/legal/privacy}" class="text-blue-400 hover:underline">Datenschutzerkl\u00e4rung</a>. Interviewprotokolle und Feedback werden in unserer Datenbank gespeichert, Audio wird in Echtzeit verarbeitet, aber nicht dauerhaft gespeichert, und API-Schl\u00fcssel werden nur in Ihrem Browser gespeichert.

legal.terms.modifications.title=\u00c4nderungen am Dienst
legal.terms.modifications.content=Als Open-Source-Projekt kann der Dienst jederzeit aktualisiert, ge\u00e4ndert oder eingestellt werden, ohne Garantie auf R\u00fcckw\u00e4rtskompatibilit\u00e4t. Sie k\u00f6nnen das Projekt forken und Ihre eigene Version pflegen.

legal.terms.governing.title=Anwendbares Recht
legal.terms.governing.content=Diese Bedingungen unterliegen der GNU GPL-3.0-Lizenz. Bei Rechtsstreitigkeiten wenden Sie sich an Ihre zust\u00e4ndige Gerichtsbarkeit.

legal.terms.contact.title=Kontakt
legal.terms.contact.content=Bei Fragen zu diesen Bedingungen er\u00f6ffnen Sie bitte ein Issue im GitHub-Repository.

