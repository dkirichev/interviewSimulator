# Privacy Policy
legal.privacy.overview.title=Descripci\u00f3n General
legal.privacy.overview.content=Interview Simulator es un proyecto de c\u00f3digo abierto dise\u00f1ado para ayudarle a practicar entrevistas. Estamos comprometidos con la protecci\u00f3n de su privacidad mientras proporcionamos una experiencia de aprendizaje valiosa.

legal.privacy.dataCollected.title=Informaci\u00f3n que Recopilamos
legal.privacy.dataCollected.profile=Datos del Perfil
legal.privacy.dataCollected.profileDesc=Su nombre, puesto de trabajo objetivo y preferencias de entrevista (dificultad, idioma)
legal.privacy.dataCollected.cv=CV/Curr\u00edculum
legal.privacy.dataCollected.cvDesc=Texto extra\u00eddo de archivos PDF/DOCX subidos para personalizar las preguntas de la entrevista
legal.privacy.dataCollected.interview=Datos de la Entrevista
legal.privacy.dataCollected.interviewDesc=Transcripciones completas de sus conversaciones de entrevista con la IA
legal.privacy.dataCollected.performance=M\u00e9tricas de Rendimiento
legal.privacy.dataCollected.performanceDesc=Puntuaciones, retroalimentaci\u00f3n, fortalezas y \u00e1reas de mejora generadas por la IA

legal.privacy.dataNotCollected.title=Lo que NO Recopilamos
legal.privacy.dataNotCollected.audio=Grabaciones de Audio
legal.privacy.dataNotCollected.audioDesc=Su voz se procesa en tiempo real pero nunca se almacena permanentemente
legal.privacy.dataNotCollected.apiKey=Claves API
legal.privacy.dataNotCollected.apiKeyDesc=Se almacenan solo en el localStorage de su navegador, nunca en nuestros servidores
legal.privacy.dataNotCollected.pii=Informaci\u00f3n de Identificaci\u00f3n Personal
legal.privacy.dataNotCollected.piiDesc=No se requiere correo electr\u00f3nico, n\u00famero de tel\u00e9fono ni direcci\u00f3n

legal.privacy.storage.title=Almacenamiento y Seguridad de Datos
legal.privacy.storage.database=Las transcripciones de entrevistas y la retroalimentaci\u00f3n se almacenan en una base de datos PostgreSQL
legal.privacy.storage.browser=Las claves API y las preferencias de idioma se almacenan en el localStorage de su navegador
legal.privacy.storage.encryption=Los datos se transmiten a trav\u00e9s de conexiones WebSocket est\u00e1ndar

legal.privacy.thirdParty.title=Servicios de Terceros
legal.privacy.thirdParty.content=Esta aplicaci\u00f3n utiliza la <strong>API de Google Gemini AI</strong> para la funcionalidad de entrevistas. Su audio y transcripciones se env\u00edan a los servidores de Google para procesamiento en tiempo real. Por favor revise la <a href="https://policies.google.com/privacy" target="_blank" class="text-blue-400 hover:underline">Pol\u00edtica de Privacidad de Google</a> y los <a href="https://ai.google.dev/gemini-api/terms" target="_blank" class="text-blue-400 hover:underline">T\u00e9rminos de la API de Gemini</a>.

legal.privacy.apiKey.title=Su Clave API
legal.privacy.apiKey.important=IMPORTANTE
legal.privacy.apiKey.stored=Se almacena SOLO en el localStorage de su navegador (lado del cliente)
legal.privacy.apiKey.notTransmitted=Nunca se transmite ni se almacena en nuestros servidores
legal.privacy.apiKey.responsibility=Usted es responsable de la seguridad y los costos de uso de su clave API

legal.privacy.rights.title=Sus Derechos (Cumplimiento del RGPD)
legal.privacy.rights.access=Derecho a acceder a sus datos
legal.privacy.rights.rectification=Derecho a rectificar datos inexactos
legal.privacy.rights.erasure=Derecho de supresi\u00f3n ("derecho al olvido")
legal.privacy.rights.portability=Derecho a la portabilidad de datos
legal.privacy.rights.selfHost=Derecho a alojar la aplicaci\u00f3n por cuenta propia para un control total
legal.privacy.rights.contact=Para ejercer estos derechos, contacte al administrador de la instancia o abra un issue en GitHub.

legal.privacy.openSource.title=Transparencia de C\u00f3digo Abierto
legal.privacy.openSource.content=Este proyecto es de c\u00f3digo abierto bajo GNU GPL v3.0. Puede revisar todo el c\u00f3digo en <a href="https://github.com/dkirichev/interviewSimulator" target="_blank" class="text-blue-400 hover:underline">GitHub</a> para entender exactamente c\u00f3mo se manejan sus datos.

legal.privacy.contact.title=Contacto
legal.privacy.contact.content=Para asuntos de privacidad, por favor abra un issue en el repositorio de GitHub o contacte al administrador de la instancia.

# Terms & Conditions
legal.terms.acceptance.title=Aceptaci\u00f3n de los T\u00e9rminos
legal.terms.acceptance.content=Al usar Interview Simulator, usted acepta estos T\u00e9rminos y Condiciones. Si no est\u00e1 de acuerdo, por favor no utilice esta aplicaci\u00f3n.

legal.terms.service.title=Descripci\u00f3n del Servicio
legal.terms.service.content=Interview Simulator es una aplicaci\u00f3n gratuita y de c\u00f3digo abierto que proporciona pr\u00e1ctica de entrevistas impulsada por IA utilizando Google Gemini AI con simulaciones de voz en tiempo real, retroalimentaci\u00f3n generada por IA y puntuaci\u00f3n.

legal.terms.usage.title=Uso Aceptable
legal.terms.usage.youAgree=Usted acepta
legal.terms.usage.lawful=Usar el servicio solo para fines l\u00edcitos de pr\u00e1ctica de entrevistas
legal.terms.usage.accurate=Proporcionar informaci\u00f3n precisa durante la configuraci\u00f3n
legal.terms.usage.apiKey=Ser responsable de su propia clave API de Google Gemini y los costos asociados
legal.terms.usage.noAbuse=No intentar explotar, hackear o abusar del servicio
