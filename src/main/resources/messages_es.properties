legal.terms.apiKeyResp.title=Responsabilidad de la Clave API
legal.terms.apiKeyResp.important=IMPORTANTE
legal.terms.apiKeyResp.security=Usted es el \u00fanico responsable de la seguridad de su clave API
legal.terms.apiKeyResp.costs=Usted es responsable de todos los costos derivados del uso de la API
legal.terms.apiKeyResp.comply=Debe cumplir con los T\u00e9rminos de Servicio de la API de Google Gemini
legal.terms.apiKeyResp.liability=La aplicaci\u00f3n no es responsable del uso no autorizado de su clave API

legal.terms.license.title=Licencia de C\u00f3digo Abierto
legal.terms.license.content=Este software est\u00e1 licenciado bajo la <strong>Licencia P\u00fablica General de GNU v3.0 (GPL-3.0)</strong>. Usted es libre de usar, modificar y distribuir el software, siempre que cualquier modificaci\u00f3n tambi\u00e9n sea de c\u00f3digo abierto bajo GPL-3.0. Consulte la <a href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank" class="text-blue-400 hover:underline">LICENCIA</a> para los t\u00e9rminos completos.

legal.terms.warranty.title=Sin Garant\u00eda
legal.terms.warranty.asIs=Este software se proporciona "TAL CUAL" sin garant\u00eda
legal.terms.warranty.noGuarantee=No se garantiza tiempo de actividad, disponibilidad ni precisi\u00f3n
legal.terms.warranty.aiFeedback=La retroalimentaci\u00f3n generada por IA puede no ser precisa ni completa
legal.terms.warranty.notSubstitute=No es un sustituto del asesoramiento profesional de carrera
legal.terms.warranty.noSuccess=Los resultados no garantizan el \u00e9xito en entrevistas reales

legal.terms.liability.title=Limitaci\u00f3n de Responsabilidad
legal.terms.liability.content=Los desarrolladores y colaboradores no son responsables de ning\u00fan da\u00f1o resultante del uso del servicio, costos de API incurridos, p\u00e9rdida de datos, brechas de seguridad, interrupciones del servicio o decisiones tomadas basadas en la retroalimentaci\u00f3n generada por IA.

legal.terms.thirdParty.title=Servicios de Terceros
legal.terms.thirdParty.content=Esta aplicaci\u00f3n utiliza Google Gemini AI, que tiene sus propios t\u00e9rminos. Debe cumplir con los <a href="https://ai.google.dev/gemini-api/terms" target="_blank" class="text-blue-400 hover:underline">T\u00e9rminos de la API de Google Gemini</a>. La disponibilidad del servicio de Google afecta a esta aplicaci\u00f3n y puede cambiar en cualquier momento.

legal.terms.privacy.title=Datos y Privacidad
legal.terms.privacy.content=Su uso est\u00e1 sujeto a nuestra <a th:href="@{/legal/privacy}" class="text-blue-400 hover:underline">Pol\u00edtica de Privacidad</a>. Las transcripciones de entrevistas y la retroalimentaci\u00f3n se almacenan en nuestra base de datos, el audio se procesa en tiempo real pero no se almacena permanentemente, y las claves API se almacenan solo en su navegador.

legal.terms.modifications.title=Modificaciones al Servicio
legal.terms.modifications.content=Como proyecto de c\u00f3digo abierto, el servicio puede ser actualizado, modificado o descontinuado en cualquier momento sin garant\u00eda de compatibilidad con versiones anteriores. Puede bifurcar y mantener su propia versi\u00f3n.

